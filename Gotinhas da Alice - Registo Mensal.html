<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotinhas da Alice - Registo Mensal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #fff5f8;
      }
      .title-font {
        font-family: 'Dancing Script', cursive;
      }

      /* Cursor pointer global para elementos interativos */
      select,
      option,
      button,
      .checkbox-custom {
        cursor: pointer !important;
      }

      /* Configurações específicas para impressão em A4 */
      @media print {
        @page {
          size: A4;
          margin: 0.5cm 0.8cm;
        }
        .no-print {
          display: none !important;
        }
        body {
          background-color: white !important;
          padding: 0 !important;
          margin: 0 !important;
        }
        .print-container {
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0.2cm 0.4cm !important;
          width: 100% !important;
          height: 100% !important;
          border: none !important;
        }
        table {
          page-break-inside: auto;
          width: 100%;
          border-collapse: collapse;
        }
        tr {
          page-break-inside: avoid;
          page-break-after: auto;
        }

        /* Ajuste drástico para caber 31 days + rodapé numa única folha */
        .row-day-cell {
          padding-top: 5px !important;
          padding-bottom: 2px !important;
          line-height: 1 !important;
        }
        .checkbox-custom {
          width: 18px !important;
          height: 18px !important;
        }
        h1 {
          font-size: 2.5rem !important;
          margin-bottom: 0 !important;
        }
        .header-info {
          margin-bottom: 0.5rem !important;
        }
        .footer-margin {
          margin-top: 0.5rem !important;
        }
      }

      .checkbox-custom {
        width: 20px;
        height: 20px;
        border: 2px solid #f9a8d4;
        border-radius: 50%;
        display: inline-block;
      }
    </style>
  </head>
  <body class="p-4 md:p-6">
    <div
      class="max-w-2xl mx-auto bg-white p-6 rounded-3xl shadow-xl print-container relative overflow-hidden"
    >
      <!-- Elementos Decorativos -->
      <div
        class="absolute -top-10 -right-10 w-40 h-40 bg-pink-100 rounded-full opacity-50"
      ></div>
      <div
        class="absolute -bottom-10 -left-10 w-32 h-32 bg-pink-50 rounded-full opacity-50"
      ></div>

      <!-- Cabeçalho -->
      <div class="text-center mb-2 relative header-info">
        <h1 class="text-4xl text-pink-500 title-font mb-1"
          >Gotinhas da Alice</h1
        >

        <div id="status-header">
          <p class="text-gray-400 italic text-xs no-print"
            >Selecionar o mês para gerar a tabela de controlo</p
          >
        </div>

        <!-- Seletor de Mês -->
        <div class="no-print mt-4">
          <select
            id="month-select"
            onchange="selectMonth()"
            class="bg-pink-50 border border-pink-200 text-pink-700 text-md rounded-xl focus:ring-pink-500 focus:border-pink-500 p-2 cursor-pointer shadow-sm"
          >
            <option value="" disabled selected>Escolher mês...</option>
            <option value="0">Janeiro</option>
            <option value="1">Fevereiro</option>
            <option value="2">Março</option>
            <option value="3">Abril</option>
            <option value="4">Maio</option>
            <option value="5">Junho</option>
            <option value="6">Julho</option>
            <option value="7">Agosto</option>
            <option value="8">Setembro</option>
            <option value="9">Outubro</option>
            <option value="10">Novembro</option>
            <option value="11">Dezembro</option>
          </select>
        </div>

        <div class="flex justify-center mt-2 space-x-6">
          <span class="text-xl text-pink-300">🌸</span>
          <span class="text-xl text-blue-200">☁️</span>
          <span class="text-xl text-yellow-200">✨</span>
        </div>
      </div>

      <!-- Contentor da Tabela -->
      <div id="container-table" class="hidden border-t-2 border-pink-100 mt-1">
        <table class="w-full text-left">
          <thead>
            <tr class="text-pink-600 border-b border-pink-100">
              <th class="py-1 px-2 w-20 text-md align-middle">Dia</th>
              <th class="py-1 px-2 text-center align-middle">
                <div class="text-md font-bold">💧 BioGaia</div>
                <div class="text-[9px] text-pink-400 font-normal leading-none"
                  >(5 gotas)</div
                >
              </th>
              <th class="py-1 px-2 text-center align-middle">
                <div class="text-md font-bold">☀️ Nancare</div>
                <div class="text-[9px] text-pink-400 font-normal leading-none"
                  >(2 gotas)</div
                >
              </th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Gerado por JS -->
          </tbody>
        </table>
      </div>

      <!-- Rodapé -->
      <div
        id="footer-actions"
        class="mt-2 flex justify-between items-end hidden footer-margin"
      >
        <div
          id="custom-message"
          class="text-xs text-pink-400 italic font-bold max-w-[70%]"
        >
          <!-- Mensagem dinâmica -->
        </div>
        <div class="no-print">
          <button
            onclick="window.print()"
            class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition-all transform hover:scale-105 inline-flex items-center text-sm"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"
              ></path>
            </svg>
            Imprimir
          </button>
        </div>
      </div>
    </div>

    <script>
      const monthData = {
        0: {
          month: 'Janeiro',
          days: 31,
          message: 'Um ano novo cheinho de saúde para a Alice! ✨',
        },
        1: {
          month: 'Fevereiro',
          days: 28,
          message: 'O mês do amor e de muitas gotinhas de saúde! ❤️',
        },
        2: {
          month: 'Março',
          days: 31,
          message: 'A primavera chega com o sorriso da Alice! 🌸',
        },
        3: {
          month: 'Abril',
          days: 30,
          message: 'Mil sorrisos e muita vitalidade para a nossa menina! ☁️',
        },
        4: {
          month: 'Maio',
          days: 31,
          message: 'Mês das flores e da nossa flor mais bela, a Alice! 🌺',
        },
        5: {
          month: 'Junho',
          days: 30,
          message: 'Dias de sol e muita energia para crescer feliz! ☀️',
        },
        6: {
          month: 'Julho',
          days: 31,
          message: 'Férias, sol e saúde para a pequena Alice! 🍦',
        },
        7: {
          month: 'Agosto',
          days: 31,
          message: 'Mês quente e de muita hidratação e vitaminas! 🌊',
        },
        8: {
          month: 'Setembro',
          days: 30,
          message: 'Novas aventuras esperam pela Alice este mês! 🍂',
        },
        9: {
          month: 'Outubro',
          days: 31,
          message: 'Doces sorrisos e muita saúde para a nossa Alice! 🍭',
        },
        10: {
          month: 'Novembro',
          days: 30,
          message: 'Dias aconchegantes e gotinhas protetoras! 🧸',
        },
        11: {
          month: 'Dezembro',
          days: 31,
          message: 'O Natal da Alice com muita saúde e alegria! 🎄',
        },
      };

      function leapYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
      }

      function selectMonth() {
        const selector = document.getElementById('month-select');
        const option = selector.value;
        const container = document.getElementById('container-table');
        const footer = document.getElementById('footer-actions');
        const statusHeader = document.getElementById('status-header');

        // Resetar todos os "disabled" das opções de meses
        Array.from(selector.options).forEach((option) => {
          option.disabled = false;
        });

        if (!option) {
          // Se não houver mês selecionado, esconde tudo e volta ao estado inicial
          container.classList.add('hidden');
          footer.classList.add('hidden');
          statusHeader.innerHTML = `<p class="text-gray-400 italic text-xs no-print">Selecionar o mês para gerar a tabela de controlo</p>`;
          return;
        }

        // Desabilitar a opção selecionada para evitar re-seleção
        selector.options[selector.selectedIndex].disabled = true;

        const currentYear = new Date().getFullYear();
        let monthDays = monthData[option].days;
        const footerMessage = monthData[option].message;
        const month = monthData[option].month;

        if (month === 'Fevereiro' && leapYear(currentYear)) {
          monthDays = 29;
        }

        document.getElementById('status-header').innerHTML =
          `<p class="text-gray-500 font-bold uppercase tracking-widest text-xs italic leading-none">Controlo de Vitaminas • ${month}</p>`;
        document.getElementById('custom-message').innerText = footerMessage;
        document.getElementById('container-table').classList.remove('hidden');
        document.getElementById('footer-actions').classList.remove('hidden');

        generateTable(monthDays);
      }

      function generateTable(days) {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';

        // Padding extremamente reduzido para a versão de impressão
        const paddingClass = 'pt-2';

        for (let i = 1; i <= days; i++) {
          const row = `
                    <tr class="border-b border-pink-50 hover:bg-pink-50 transition-colors">
                        <td class="${paddingClass} px-2 font-bold text-gray-600 text-md row-day-cell">${i}</td>
                        <td class="${paddingClass} px-2 text-center row-day-cell"><div class="checkbox-custom"></div></td>
                        <td class="${paddingClass} px-2 text-center row-day-cell"><div class="checkbox-custom"></div></td>
                    </tr>
                `;
          tableBody.innerHTML += row;
        }
      }
    </script>
  </body>
</html>
